<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>家庭分工工作台</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f7f3ea'/%3E%3Crect x='13' y='15' width='38' height='36' rx='7' fill='%23fffaf0' stroke='%2324211d' stroke-width='4'/%3E%3Cpath d='M13 26h38' stroke='%2324211d' stroke-width='4'/%3E%3Cpath d='M23 11v9M41 11v9' stroke='%2324211d' stroke-width='5' stroke-linecap='round'/%3E%3Crect x='19' y='32' width='12' height='12' rx='3' fill='%231f6f68'/%3E%3Crect x='34' y='32' width='12' height='12' rx='3' fill='%239a4f34'/%3E%3C/svg%3E" />
  <style>
    :root {
      --paper: #f7f3ea;
      --panel: #fffaf0;
      --ink: #24211d;
      --muted: #746b5e;
      --line: #d8cdb9;
      --mo: #1f6f68;
      --mo-soft: #dff1ec;
      --lisa: #9a4f34;
      --lisa-soft: #f6e1d6;
      --empty: #ebe3d4;
      --accent: #c6a15b;
      --shadow: 0 18px 48px rgba(63, 49, 30, .16);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Avenir Next", "Noto Sans TC", "PingFang TC", sans-serif;
      background:
        linear-gradient(90deg, rgba(36, 33, 29, .035) 1px, transparent 1px),
        linear-gradient(rgba(36, 33, 29, .028) 1px, transparent 1px),
        var(--paper);
      background-size: 36px 36px;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
    }

    .assignment-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      user-select: none;
    }

    .assignment-chip[data-person="mo"] {
      color: #113d39;
      background: var(--mo-soft);
      border-color: rgba(31, 111, 104, .24);
    }

    .assignment-chip[data-person="lisa"] {
      color: #65311f;
      background: var(--lisa-soft);
      border-color: rgba(154, 79, 52, .24);
    }

    .assignment-chip[data-person="both"] {
      color: #453817;
      background: #f6edcc;
      border-color: rgba(198, 161, 91, .34);
    }

    .assignment-chip:active {
      cursor: grabbing;
    }

    .icon {
      display: block;
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .drag-handle {
      display: grid;
      width: 30px;
      height: 30px;
      place-items: center;
      color: currentColor;
      opacity: .54;
    }

    .main {
      padding: 20px 24px 24px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 10px;
    }

    .title-block h2 {
      margin: 0;
      font-family: Georgia, "Noto Serif TC", serif;
      font-size: clamp(28px, 3.2vw, 46px);
      line-height: 1;
    }

    .view-tabs {
      display: inline-flex;
      gap: 4px;
      margin-top: 10px;
      padding: 4px;
      background: rgba(255, 250, 240, .82);
      border: 1px solid var(--line);
      border-radius: 999px;
    }

    .view-tab {
      min-height: 32px;
      padding: 7px 12px;
      color: var(--muted);
      background: transparent;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .view-tab[aria-selected="true"] {
      color: #fff;
      background: var(--ink);
    }

    .app-view {
      display: none;
    }

    .app-view.active {
      display: block;
    }

    body[data-view="ops"] .actions {
      display: none;
    }

    .title-block p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .time-rules {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .time-rule-card {
      display: grid;
      gap: 9px;
      padding: 11px 12px;
      color: var(--ink);
      background: rgba(255, 250, 240, .84);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 6px 18px rgba(55, 43, 28, .06);
      text-align: left;
    }

    .time-rule-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .time-rule-head strong {
      color: var(--accent);
      font-family: Georgia, serif;
      font-size: 16px;
      line-height: 1;
    }

    .time-rule-head svg {
      width: 14px;
      height: 14px;
      opacity: .52;
    }

    .time-rule-list {
      display: grid;
      gap: 6px;
    }

    .time-rule-row {
      display: grid;
      grid-template-columns: 68px minmax(0, 1fr);
      gap: 9px;
      align-items: baseline;
    }

    .time-rule-row strong {
      font-size: 12px;
      line-height: 1.35;
      white-space: nowrap;
    }

    .time-rule-row span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.42;
    }

    .time-rule-add {
      display: grid;
      min-height: 86px;
      place-items: center;
      color: var(--muted);
      background: rgba(255, 250, 240, .58);
      border: 1px dashed rgba(198, 161, 91, .5);
      border-radius: var(--radius);
      box-shadow: 0 6px 18px rgba(55, 43, 28, .04);
    }

    .time-rule-add .icon {
      width: 22px;
      height: 22px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }

    .icon-button,
    .text-button {
      min-height: 36px;
      padding: 8px 10px;
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 6px 18px rgba(55, 43, 28, .07);
    }

    .icon-button {
      width: 40px;
      padding: 0;
      display: grid;
      place-items: center;
    }

    .text-button.primary {
      color: #fff;
      background: var(--ink);
      border-color: var(--ink);
    }

    .mode-pill {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 8px 11px;
      color: var(--muted);
      background: rgba(255, 250, 240, .62);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 800;
    }

    body.is-editing .mode-pill {
      color: #453817;
      background: #f6edcc;
      border-color: rgba(198, 161, 91, .38);
    }

    body:not(.is-editing) .assignment-chip {
      cursor: default;
    }

    body:not(.is-editing) .time-rule-card {
      cursor: default;
    }

    body:not(.is-editing) .time-rule-head svg {
      display: none;
    }

    body:not(.is-editing) .slot-menu-button {
      display: none;
    }

    body:not(.is-editing) .empty-state .icon {
      opacity: .18;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .board-wrap,
    .inspector {
      background: rgba(255, 250, 240, .82);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .board-wrap {
      overflow: auto;
    }

    .inspector {
      display: none;
    }

    .week-board {
      display: grid;
      grid-template-columns: 112px repeat(14, 118px);
      grid-template-rows: 68px repeat(3, 118px);
      min-width: 1764px;
    }

    .board-corner,
    .date-cell,
    .row-label,
    .slot {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .board-corner {
      position: sticky;
      left: 0;
      z-index: 4;
      display: grid;
      align-items: end;
      padding: 12px;
      color: var(--muted);
      background: rgba(255, 250, 240, .92);
      font-size: 12px;
      font-weight: 700;
    }

    .date-cell {
      display: grid;
      align-content: center;
      gap: 2px;
      padding: 10px 12px;
      background: rgba(255, 250, 240, .92);
    }

    .date-cell.weekend {
      background: rgba(236, 226, 207, .68);
    }

    .date {
      display: flex;
      align-items: flex-start;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .date strong {
      font-family: Georgia, serif;
      font-size: 23px;
      line-height: 1;
    }

    .date span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
    }

    .row-label {
      position: sticky;
      left: 0;
      z-index: 3;
      display: grid;
      align-content: center;
      padding: 10px 12px;
      background: rgba(255, 250, 240, .96);
    }

    .row-label strong {
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
    }

    .slot {
      position: relative;
      display: grid;
      align-content: center;
      min-height: 0;
      padding: 8px;
      background: rgba(255, 255, 255, .48);
      transition: border-color .16s ease, transform .16s ease, background .16s ease;
    }

    .slot.weekend-muted {
      background:
        linear-gradient(135deg, rgba(116, 107, 94, .08) 25%, transparent 25%, transparent 50%, rgba(116, 107, 94, .08) 50%, rgba(116, 107, 94, .08) 75%, transparent 75%),
        rgba(236, 226, 207, .25);
      background-size: 12px 12px;
    }

    .slot.all-day {
      align-content: center;
      background: rgba(236, 226, 207, .46);
    }

    .slot.all-day .assignment-chip,
    .slot.all-day .empty-state {
      width: 100%;
      height: 100%;
      min-height: 318px;
    }

    .slot.all-day .assignment-chip {
      display: grid;
      place-items: center;
      font-size: 19px;
    }

    .ops-row-label {
      position: sticky;
      left: 0;
      z-index: 3;
      display: grid;
      align-content: center;
      padding: 10px 12px;
      background: rgba(255, 250, 240, .96);
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .ops-row-label strong {
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
    }

    .ops-day-cell {
      display: grid;
      align-content: start;
      gap: 6px;
      min-height: 96px;
      padding: 7px;
      background: rgba(255, 250, 240, .42);
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .ops-day-chip {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 6px;
      align-items: start;
      padding: 7px 8px;
      color: #433722;
      background: rgba(246, 237, 204, .72);
      border: 1px solid rgba(198, 161, 91, .24);
      border-radius: var(--radius);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.28;
    }

    .ops-day-chip span:last-child {
      min-width: 0;
    }

    .slot.drag-over {
      background: #fffdf8;
      border-color: var(--accent);
      box-shadow: inset 0 0 0 2px rgba(198, 161, 91, .38);
    }

    .slot.has-note {
      background-image: linear-gradient(135deg, rgba(198, 161, 91, .12), transparent 45%);
    }

    .slot-note {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: calc(100% - 6px);
      z-index: 5;
      max-width: 220px;
      padding: 9px 10px;
      color: #fff;
      background: rgba(36, 33, 29, .96);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      font-size: 12px;
      line-height: 1.45;
      opacity: 0;
      transform: translateY(6px);
      pointer-events: none;
      transition: opacity .14s ease, transform .14s ease;
    }

    .slot.has-note:hover .slot-note {
      opacity: 1;
      transform: translateY(0);
    }

    .slot-menu-button {
      position: absolute;
      top: 50%;
      right: 13px;
      display: grid;
      width: 28px;
      height: 28px;
      place-items: center;
      color: currentColor;
      background: transparent;
      border: 0;
      border-radius: 0;
      opacity: 0;
      transform: translateY(-50%) scale(.96);
      transition: opacity .14s ease, transform .14s ease;
    }

    .slot:hover .slot-menu-button,
    .slot:focus-within .slot-menu-button {
      opacity: 1;
      transform: translateY(-50%) scale(1);
    }

    .slot[data-person="mo"] .slot-menu-button {
      color: #113d39;
    }

    .slot[data-person="lisa"] .slot-menu-button {
      color: #65311f;
    }

    .slot[data-person="both"] .slot-menu-button {
      color: #453817;
    }

    .note-dot {
      position: absolute;
      right: 12px;
      bottom: 10px;
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
    }

    .slot-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .slot-label span:last-child {
      font-weight: 500;
      opacity: .72;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      width: 100%;
      height: 100%;
      color: #9c917f;
      background: rgba(235, 227, 212, .48);
      border: 1px dashed rgba(203, 191, 169, .72);
      border-radius: var(--radius);
      font-size: 12px;
    }

    .empty-state .icon {
      width: 22px;
      height: 22px;
      opacity: .62;
    }

    .assignment-chip {
      justify-content: center;
      width: 100%;
      height: 100%;
      min-height: 78px;
      padding: 10px 40px 10px 12px;
      cursor: grab;
      font-size: 17px;
    }

    .inspector {
      padding: 16px;
    }

    .inspector h3 {
      margin: 0 0 12px;
      font-family: Georgia, "Noto Serif TC", serif;
      font-size: 22px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat {
      padding: 12px;
      background: rgba(255, 255, 255, .52);
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .stat strong {
      display: block;
      font-size: 24px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .timeline {
      display: grid;
      gap: 8px;
      max-height: 360px;
      overflow: auto;
      padding-right: 4px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 56px 1fr;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(216, 205, 185, .7);
      font-size: 13px;
    }

    .timeline-item time {
      color: var(--muted);
    }

    .calendar-box {
      margin-top: 16px;
      padding: 14px;
      background: #24211d;
      color: #fff;
      border-radius: var(--radius);
    }

    .calendar-box p {
      margin: 8px 0 12px;
      color: rgba(255, 255, 255, .72);
      font-size: 13px;
      line-height: 1.45;
    }

    .calendar-box button {
      width: 100%;
      min-height: 38px;
      color: var(--ink);
      background: #f2d28b;
      border-radius: var(--radius);
    }

    .ops-page {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(300px, .85fr);
      gap: 14px;
      align-items: start;
    }

    .ops-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .ops-head h2 {
      margin: 0;
      font-family: Georgia, "Noto Serif TC", serif;
      font-size: 34px;
      line-height: 1;
    }

    .perspective-switch {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      background: rgba(255, 250, 240, .82);
      border: 1px solid var(--line);
      border-radius: 999px;
    }

    .perspective-switch button {
      min-height: 32px;
      padding: 7px 12px;
      color: var(--muted);
      background: transparent;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
    }

    .perspective-switch button.active {
      color: #fff;
      background: var(--mo);
    }

    .ops-panel {
      padding: 14px;
      background: rgba(255, 250, 240, .82);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 24px rgba(63, 49, 30, .08);
    }

    .ops-panel + .ops-panel {
      margin-top: 12px;
    }

    .ops-panel h3 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 10px;
      font-size: 16px;
    }

    .ops-pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 5px 9px;
      color: var(--muted);
      background: rgba(255, 255, 255, .48);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .ops-timeline,
    .ops-list {
      display: grid;
      gap: 8px;
    }

    .ops-event {
      display: grid;
      grid-template-columns: 62px 30px minmax(0, 1fr) auto;
      gap: 9px;
      align-items: center;
      padding: 10px;
      background: rgba(255, 255, 255, .48);
      border: 1px solid rgba(216, 205, 185, .74);
      border-radius: var(--radius);
    }

    .ops-event time {
      font-family: Georgia, serif;
      font-weight: 800;
      line-height: 1.05;
    }

    .ops-event time span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-family: "Avenir Next", "Noto Sans TC", "PingFang TC", sans-serif;
      font-size: 11px;
    }

    .ops-icon {
      display: grid;
      width: 30px;
      height: 30px;
      place-items: center;
      background: #f6edcc;
      border-radius: var(--radius);
    }

    .ops-event-main strong,
    .ops-rule strong {
      display: block;
      font-size: 13px;
      line-height: 1.35;
    }

    .ops-event-main span,
    .ops-rule span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .ops-status {
      min-width: 54px;
      padding: 5px 7px;
      color: var(--muted);
      background: rgba(116, 107, 94, .1);
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
    }

    .ops-status.soon {
      color: #725411;
      background: rgba(246, 237, 204, .88);
    }

    .ops-status.today {
      color: #fff;
      background: #9a4f34;
    }

    .ops-rule {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      background: rgba(255, 255, 255, .48);
      border: 1px solid rgba(216, 205, 185, .74);
      border-radius: var(--radius);
    }

    .ops-rule.pending {
      background: rgba(246, 237, 204, .58);
      border-color: rgba(198, 161, 91, .28);
    }

    .add-rule-button,
    .agreement-button {
      width: 100%;
      min-height: 40px;
      border-radius: var(--radius);
      font-weight: 800;
    }

    .add-rule-button {
      margin-bottom: 9px;
      color: var(--mo);
      background: rgba(223, 241, 236, .42);
      border: 1px dashed rgba(31, 111, 104, .4);
    }

    .agreement-button {
      color: #fff;
      background: var(--ink);
      border: 1px solid var(--ink);
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      padding: 12px 14px;
      color: #fff;
      background: rgba(36, 33, 29, .94);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .slot-popover {
      position: fixed;
      z-index: 20;
      display: none;
      width: min(320px, calc(100vw - 28px));
      padding: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .slot-popover.open {
      display: block;
    }

    .popover-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .popover-head strong {
      display: block;
      font-size: 15px;
    }

    .popover-head span {
      color: var(--muted);
      font-size: 12px;
    }

    function toKey(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function addDays(dateKey, amount) {
      const next = toDate(dateKey);
      next.setDate(next.getDate() + amount);
      return toKey(next);
    }

    function formatDate(dateKey) {
      const date = toDate(dateKey);
      return `${date.getMonth() + 1}/${date.getDate()}`;

    function compareDateKeys(a, b) {
      return a.localeCompare(b);
    }

    function nthWeekdayDate(year, monthIndex, nth, weekday) {
      const date = new Date(year, monthIndex, 1);
      const offset = (weekday - date.getDay() + 7) % 7;
      date.setDate(1 + offset + ((nth - 1) * 7));
      return date.getMonth() === monthIndex ? toKey(date) : "";
    }

    function generateOpsEvents(startKey, days) {
      const start = toDate(startKey);
      const endKey = addDays(startKey, days - 1);
      const monthKeys = new Set();
      for (const cursor = new Date(start.getFullYear(), start.getMonth(), 1); toKey(cursor) <= endKey; cursor.setMonth(cursor.getMonth() + 1)) {
        monthKeys.add(`${cursor.getFullYear()}-${cursor.getMonth()}`);
      }

      const events = [];
      opsRules.forEach((rule) => {
        if (rule.type === "monthlyDay") {
          monthKeys.forEach((monthKey) => {
            const [year, monthIndex] = monthKey.split("-").map(Number);
            events.push({ ...rule, dateKey: toKey(new Date(year, monthIndex, rule.day)) });
          });
        }

        if (rule.type === "monthlyNthWeekday") {
          monthKeys.forEach((monthKey) => {
            const [year, monthIndex] = monthKey.split("-").map(Number);
            const dateKey = nthWeekdayDate(year, monthIndex, rule.nth, rule.weekday);
            if (dateKey) events.push({ ...rule, dateKey });
          });
        }

        if (rule.type === "yearlyDate") {
          const startYear = start.getFullYear();
          [startYear, startYear + 1].forEach((year) => {
            events.push({ ...rule, dateKey: toKey(new Date(year, rule.month - 1, rule.day)) });
          });
        }
      });

      return events
        .filter((event) => compareDateKeys(event.dateKey, startKey) >= 0 && compareDateKeys(event.dateKey, endKey) <= 0)
        .sort((a, b) => compareDateKeys(a.dateKey, b.dateKey));
    }

      if (rule.type === "yearlyDate") return `每年 ${String(rule.month).padStart(2, "0")}/${String(rule.day).padStart(2, "0")}`;
      return "條件觸發";

      opsView.classList.toggle("active", view === "ops");
      viewTabs.forEach((button) => button.setAttribute("aria-selected", String(button.dataset.view === view)));
      if (view === "ops") renderOps();
    }

    function upgradeKnownRuleText(text) {
      return text === "真真 15:30；樂樂依星期調整"
        ? "真真 15:30；樂樂 週一 14:00 / 週二 15:00 / 週三 18:00 / 週四 15:00 / 週五 15:00"
        : text;
    }

    function normalizeTimeRuleSet(value, slotId) {
      if (Array.isArray(value)) {
        return value
          .map((rule) => ({
            start: rule.start || todayKey(),
            end: rule.end || "",
            text: upgradeKnownRuleText(String(rule.text || "").trim())
          }))
          .filter((rule) => rule.text);
      }
      if (typeof value === "string" && value.trim()) {
        return [{ start: todayKey(), end: "", text: upgradeKnownRuleText(value.trim()) }];
      }
      return structuredClone(defaultTimeRules[slotId] || []);
    }

    function normalizeTimeRules(value = {}) {
      const normalized = {};
      Object.keys(defaultTimeRules).forEach((slotId) => {
        normalized[slotId] = normalizeTimeRuleSet(value[slotId], slotId);
      });
      return normalized;
    }

    function formatRuleDate(dateKey) {
      if (!dateKey) return "";
      const date = toDate(dateKey);
      return `${date.getMonth() + 1}/${date.getDate()}`;
    }

    function formatRuleRange(rule) {
      if (!rule.start && !rule.end) return "全期間";
      if (rule.start && !rule.end) return `${formatRuleDate(rule.start)} 起`;
      return `${formatRuleDate(rule.start)}-${formatRuleDate(rule.end)}`;
    }

    function getTimeRuleForDate(slotId, dateKey) {
      const rules = normalizeTimeRuleSet(state.timeRules[slotId], slotId);
      return rules.find((rule) => {
        const afterStart = !rule.start || compareDateKeys(dateKey, rule.start) >= 0;
        const beforeEnd = !rule.end || compareDateKeys(dateKey, rule.end) <= 0;
        return afterStart && beforeEnd;
      }) || rules[0] || null;
    }

    function getTimeRuleGroups() {
      const groups = new Map();
      timeRuleSlots().forEach((slot) => {
        normalizeTimeRuleSet(state.timeRules[slot.id], slot.id).forEach((rule) => {
          const key = `${rule.start || ""}|${rule.end || ""}`;
          if (!groups.has(key)) {
            groups.set(key, { start: rule.start || "", end: rule.end || "", rules: {} });
          }
          groups.get(key).rules[slot.id] = rule.text;
        });
      });
      return [...groups.values()].sort((a, b) => compareDateKeys(a.start || "0000-00-00", b.start || "0000-00-00"));
    }

    function earliestAssignmentKey() {
      const keys = Object.keys(state.assignments).sort();
      return keys[0] || todayKey();
    }

    function visibleStartDate() {
      const today = todayKey();
      if (state.showPast) {
        const earliest = earliestAssignmentKey();
        return compareDateKeys(earliest, today) < 0 ? earliest : today;
      }
      return compareDateKeys(state.weekStart, today) < 0 ? today : state.weekStart;
    }

    function getSlots(dateKey) {
      const day = toDate(dateKey).getDay();
      return day === 0 || day === 6
        ? modules[state.activeModule].weekendSlots
        : modules[state.activeModule].weekdaySlots;
    }

    function getWeekDates() {
      const start = visibleStartDate();
      return Array.from({ length: state.visibleDays }, (_, index) => addDays(start, index));
    }

    function persistState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function enterEditMode() {
      editBaseline = snapshot();
      history.undo = [];
      history.redo = [];
      isEditing = true;
      closePopover();
      render();
      showToast("已進入編輯模式");
    }

    function saveEditMode() {
      persistState();
      editBaseline = null;
      history.undo = [];
      history.redo = [];
      isEditing = false;
      closePopover();
      render();
      showToast("已儲存");
    }

    function cancelEditMode() {
      if (!isEditing || !editBaseline) return;
      restoreSnapshot(editBaseline);
      editBaseline = null;
      history.undo = [];
      history.redo = [];
      isEditing = false;
      closePopover();
      render();
      showToast("已取消編輯");
    }

    function saveState() {
      if (!isEditing) {
        enterEditMode();
        return;
      }
      saveEditMode();
    }

    function requireEditing() {
      if (isEditing) return true;
      showToast("目前是查看模式，請先按「編輯」");
      return false;
    }

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;
      try {
        const parsed = JSON.parse(saved);
        state.activeModule = parsed.activeModule || state.activeModule;
        state.assignments = parsed.assignments || state.assignments;
        state.notes = parsed.notes || {};
        state.timeRules = normalizeTimeRules(parsed.timeRules || {});
        state.weekStart = todayKey();
        state.showPast = false;
        state.visibleDays = INITIAL_VISIBLE_DAYS;
      } catch {
        showToast("讀取儲存資料失敗，已使用初始版本");
      }
    }

    function snapshot() {
      return {
        weekStart: state.weekStart,
        activeModule: state.activeModule,
        assignments: structuredClone(state.assignments),
        notes: structuredClone(state.notes),
        timeRules: structuredClone(state.timeRules),
        showPast: state.showPast,
        visibleDays: state.visibleDays
      };
    }

    function restoreSnapshot(nextState) {
      state.weekStart = nextState.weekStart;
      state.activeModule = nextState.activeModule;
      state.assignments = structuredClone(nextState.assignments);
      state.notes = structuredClone(nextState.notes || {});
      state.timeRules = normalizeTimeRules(nextState.timeRules || {});
      state.showPast = Boolean(nextState.showPast);
      state.visibleDays = Math.max(INITIAL_VISIBLE_DAYS, Number(nextState.visibleDays) || INITIAL_VISIBLE_DAYS);
      closePopover();
      render();
    }

    function commitHistory() {
      if (!isEditing) return;
      history.undo.push(snapshot());
      if (history.undo.length > 80) history.undo.shift();
      history.redo = [];
      updateHistoryButtons();
    }

    function undo() {
      if (!isEditing || !history.undo.length) return;
      history.redo.push(snapshot());
      restoreSnapshot(history.undo.pop());
      showToast("已復原");
    }

    function redo() {
      if (!isEditing || !history.redo.length) return;
      history.undo.push(snapshot());
      restoreSnapshot(history.redo.pop());
      showToast("已重做");
    }

    function updateHistoryButtons() {
      undoButton.disabled = !isEditing || history.undo.length === 0;
      redoButton.disabled = !isEditing || history.redo.length === 0;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function setDragPayload(event, payload) {
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("application/json", JSON.stringify(payload));
    }

    function readDragPayload(event) {
      try {
        return JSON.parse(event.dataTransfer.getData("application/json"));
      } catch {
        return null;
      }
    }

    function iconSvg(name) {
      const paths = {
        menu: '<path d="M5 8h14"/><path d="M5 12h14"/><path d="M5 16h14"/>',
        plus: '<path d="M12 5v14"/><path d="M5 12h14"/>'
      };
      return `<svg class="icon" viewBox="0 0 24 24" aria-hidden="true">${paths[name]}</svg>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getNoteKey(dateKey, slotId) {
      return `${dateKey}::${slotId}`;
    }

    function getSlotNote(dateKey, slotId) {
      return state.notes[getNoteKey(dateKey, slotId)] || "";
    }

    function assignPerson(dateKey, slotId, personId, source) {
      if (!requireEditing()) return;
      commitHistory();
      state.assignments[dateKey] = state.assignments[dateKey] || {};
      state.assignments[dateKey][slotId] = personId;

      if (source && source.dateKey && source.slotId) {
        const sameSlot = source.dateKey === dateKey && source.slotId === slotId;
        if (!sameSlot && state.assignments[source.dateKey]) {
          delete state.assignments[source.dateKey][source.slotId];
        }
      }

      render();
    }

    function removeAssignment(dateKey, slotId) {
      if (!requireEditing()) return;
      if (!state.assignments[dateKey]) return;
      commitHistory();
      delete state.assignments[dateKey][slotId];
      render();
    }

    function saveNote(dateKey, slotId, note) {
      if (!requireEditing()) return;
      commitHistory();
      const key = getNoteKey(dateKey, slotId);
      const trimmed = note.trim();
      if (trimmed) {
        state.notes[key] = trimmed;
      } else {
        delete state.notes[key];
      }
      render();
      showToast(trimmed ? "已儲存備註" : "已清除備註");
    }

    function allDisplaySlots() {
      const module = modules[state.activeModule];
      return [...module.weekdaySlots, ...module.weekendSlots];
    }

    function timeRuleSlots() {
      return modules[state.activeModule].weekdaySlots.filter((slot) =>
        ["morning_dropoff", "school_pickup"].includes(slot.id)
      );
    }

    function renderTimeRules() {
      timeRules.innerHTML = "";
      const groups = getTimeRuleGroups().slice(0, 2);
      groups.forEach((group) => {
        const button = document.createElement("button");
        button.className = "time-rule-card";
        button.type = "button";
        const rows = timeRuleSlots().map((slot) => `
          <div class="time-rule-row">
            <strong>${escapeHtml(slot.label)}</strong>
            <span>${escapeHtml(group.rules[slot.id] || "待確認")}</span>
          </div>
        `).join("");
        button.innerHTML = `
          <div class="time-rule-head">
            <strong>${escapeHtml(formatRuleRange(group))}</strong>
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          </div>
          <div class="time-rule-list">${rows}</div>
        `;
        button.addEventListener("click", () => {
          if (!isEditing) {
            showToast("目前是查看模式，請先按「編輯」");
            return;
          }
          editTimeRuleGroup(group);
        });
        timeRules.appendChild(button);
      });
      if (groups.length < 2) {
        const addButton = document.createElement("button");
        addButton.className = "time-rule-add";
        addButton.type = "button";
        addButton.title = "新增日期區間";
        addButton.setAttribute("aria-label", "新增日期區間");
        addButton.innerHTML = iconSvg("plus");
        addButton.addEventListener("click", addTimeRuleGroup);
        timeRules.appendChild(addButton);
      }
    }

    function addTimeRuleGroup() {
      if (!requireEditing()) return;
      const groups = getTimeRuleGroups();
      if (groups.length >= 2) {
        showToast("最多兩張日期區間卡");
        return;
      }
      const latest = groups.at(-1);
      const nextStart = latest?.end
        ? addDays(latest.end, 1)
        : addDays(latest?.start || todayKey(), 7);
      commitHistory();
      timeRuleSlots().forEach((slot) => {
        const rules = normalizeTimeRuleSet(state.timeRules[slot.id], slot.id);
        rules.push({ start: nextStart, end: "", text: "待確認" });
        state.timeRules[slot.id] = rules;
      });
      render();
      showToast("已新增日期區間");
    }

    function editTimeRuleGroup(group) {
      if (!requireEditing()) return;
      const current = [
        `期間｜${group.start || ""}~${group.end || ""}`,
        ...timeRuleSlots().map((slot) => `${slot.label}｜${group.rules[slot.id] || ""}`)
      ].join("\n");
      const next = prompt(
        `編輯日期區間卡\n格式：期間｜開始日期~結束日期\n每個項目一行，例如：\n早上送託｜真真 7:30 / 樂樂 8:00\n放學接回｜真真 15:30；樂樂 週一 14:00 / 週二 15:00 / 週三 18:00`,
        current
      );
      if (next === null) return;
      const updates = {};
      let nextStart = group.start || todayKey();
      let nextEnd = group.end || "";

      next.split("\n").forEach((line) => {
        if (!line.trim() || !line.includes("｜")) return;
        const [label = "", ...valueParts] = line.split("｜");
        const value = valueParts.join("｜").trim();
        if (label.trim() === "期間") {
          const [start = "", end = ""] = value.split("~").map((part) => part.trim());
          nextStart = start || todayKey();
          nextEnd = end || "";
          return;
        }
        const slot = timeRuleSlots().find((item) => item.label === label.trim());
        if (slot) updates[slot.id] = value;
      });

      commitHistory();
      timeRuleSlots().forEach((slot) => {
        const remaining = normalizeTimeRuleSet(state.timeRules[slot.id], slot.id)
          .filter((rule) => !(rule.start === group.start && rule.end === group.end));
        if (updates[slot.id]) {
          remaining.push({ start: nextStart, end: nextEnd, text: updates[slot.id] });
        }
        state.timeRules[slot.id] = remaining.length ? remaining : structuredClone(defaultTimeRules[slot.id] || []);
      });
      render();
      showToast("已更新日期區間");
    }

    function render() {
      document.body.classList.toggle("is-editing", isEditing);
      modeStatus.textContent = isEditing ? "編輯中" : "查看模式";
      saveButton.textContent = isEditing ? "儲存" : "編輯";
      cancelEditButton.hidden = !isEditing;
      renderTimeRules();
      renderBoard();
      renderSummary();
      renderOps();
      updateHistoryButtons();
      togglePastButton.textContent = state.showPast ? "隱藏過去" : "顯示過去";
    }

    function extendVisibleDays() {
      state.visibleDays += EXTEND_DAYS;
      render();
    }

    function maybeExtendVisibleDays() {
      if (Date.now() < autoExtendPausedUntil) return;
      if (window.matchMedia(MOBILE_QUERY).matches) {
        const distanceToBottom = document.documentElement.scrollHeight - (window.scrollY + window.innerHeight);
        if (distanceToBottom < 420) {
          extendVisibleDays();
        }
        return;
      }

      if (!boardWrap) return;
      const distanceToRight = boardWrap.scrollWidth - (boardWrap.scrollLeft + boardWrap.clientWidth);
      if (distanceToRight < 240) {
        const previousLeft = boardWrap.scrollLeft;
        extendVisibleDays();
        requestAnimationFrame(() => {
          boardWrap.scrollLeft = previousLeft;
        });
      }
    }

    function pauseAutoExtend(ms = 900) {
      autoExtendPausedUntil = Date.now() + ms;
    }

    function scrollToToday() {
      const today = todayKey();
      requestAnimationFrame(() => {
        if (window.matchMedia(MOBILE_QUERY).matches) {
          const todayCard = board.querySelector(`.mobile-day[data-date="${today}"]`);
          if (todayCard) {
            const targetTop = todayCard.getBoundingClientRect().top + window.scrollY - 12;
            window.scrollTo({ top: Math.max(0, targetTop), behavior: "smooth" });
          }
          return;
        }
        if (boardWrap) {
          boardWrap.scrollTo({ left: 0, behavior: "smooth" });
        }
      });
    }

    function renderBoard() {
      board.innerHTML = "";
      board.className = "week-board";
      if (window.matchMedia(MOBILE_QUERY).matches) {
        renderMobileBoard();
        return;
      }
      board.style.gridTemplateColumns = `112px repeat(${state.visibleDays}, 118px)`;
      board.style.gridTemplateRows = "68px repeat(3, 118px) 96px";
      const weekdaySlots = modules[state.activeModule].weekdaySlots;
      const dates = getWeekDates();
      const opsEvents = generateOpsEvents(visibleStartDate(), state.visibleDays);
      const corner = document.createElement("div");
      corner.className = "board-corner";
      corner.textContent = "類別";
      board.appendChild(corner);

      dates.forEach((dateKey, index) => {
        const date = toDate(dateKey);
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
        const header = document.createElement("header");
        header.className = `date-cell${isWeekend ? " weekend" : ""}`;
        header.dataset.date = dateKey;
        header.style.gridColumn = String(index + 2);
        header.style.gridRow = "1";
        header.innerHTML = `
          <div class="date">
            <strong>${formatDate(dateKey)}</strong>
            <span>${weekdayLabels[date.getDay()]}</span>
          </div>
        `;
        board.appendChild(header);
      });

      weekdaySlots.forEach((slot, index) => {
        const label = document.createElement("div");
        label.className = "row-label";
        label.style.gridColumn = "1";
        label.style.gridRow = String(index + 2);
        label.innerHTML = `<strong>${slot.label}</strong>`;
        board.appendChild(label);
      });

      const opsLabel = document.createElement("div");
      opsLabel.className = "ops-row-label";
      opsLabel.style.gridColumn = "1";
      opsLabel.style.gridRow = "5";
      opsLabel.innerHTML = "<strong>今日事務</strong>";
      board.appendChild(opsLabel);

      dates.forEach((dateKey, dayIndex) => {
        const date = toDate(dateKey);
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
        const column = String(dayIndex + 2);

        if (isWeekend) {
          const slot = modules[state.activeModule].weekendSlots[0];
          const slotEl = renderSlot(dateKey, slot);
          slotEl.style.gridColumn = column;
          slotEl.style.gridRow = "2 / 5";
          board.appendChild(slotEl);
          return;
        }

        weekdaySlots.forEach((slot, slotIndex) => {
          const slotEl = renderSlot(dateKey, slot);
          slotEl.style.gridColumn = column;
          slotEl.style.gridRow = String(slotIndex + 2);
          board.appendChild(slotEl);
        });
      });

      dates.forEach((dateKey, dayIndex) => {
        const opsCell = document.createElement("div");
        opsCell.className = "ops-day-cell";
        opsCell.style.gridColumn = String(dayIndex + 2);
        opsCell.style.gridRow = "5";
        opsCell.innerHTML = opsEvents
          .filter((event) => event.dateKey === dateKey)
          .map(renderOpsDayChip)
          .join("");
        board.appendChild(opsCell);
      });
    }

    function renderMobileBoard() {
      board.className = "week-board mobile-board";
      board.style.gridTemplateColumns = "";
      board.style.gridTemplateRows = "";
      const dates = getWeekDates();
      const opsEvents = generateOpsEvents(visibleStartDate(), state.visibleDays);

      dates.forEach((dateKey) => {
        const date = toDate(dateKey);
        const dayEl = document.createElement("article");
        dayEl.className = "mobile-day";
        dayEl.dataset.date = dateKey;

        const header = document.createElement("header");
        header.className = "mobile-day-header";
        header.innerHTML = `<strong>${formatDate(dateKey)}</strong><span>${weekdayLabels[date.getDay()]}</span>`;
        dayEl.appendChild(header);

        getSlots(dateKey).forEach((slot) => {
          const row = document.createElement("div");
          row.className = "mobile-slot-row";

          const label = document.createElement("div");
          label.className = "mobile-slot-label";
          label.innerHTML = `<strong>${slot.label}</strong>`;

          row.append(label, renderSlot(dateKey, slot));
          dayEl.appendChild(row);
        });

        const opsRow = document.createElement("div");
        opsRow.className = "mobile-slot-row ops-mobile-row";
        const opsLabel = document.createElement("div");
        opsLabel.className = "mobile-slot-label";
        opsLabel.innerHTML = "<strong>今日事務</strong>";
        const opsList = document.createElement("div");
        opsList.className = "mobile-ops-list";
        opsList.innerHTML = opsEvents
          .filter((event) => event.dateKey === dateKey)
          .map(renderOpsDayChip)
          .join("");
        opsRow.append(opsLabel, opsList);
        dayEl.appendChild(opsRow);

        board.appendChild(dayEl);
      });
    }

    function renderOpsDayChip(event) {
      const amount = event.amount ? ` ${formatAmount(event.amount)}` : "";
      return `<div class="ops-day-chip"><span>${event.icon}</span><span>${escapeHtml(event.action)}${escapeHtml(amount)}</span></div>`;
    }

    function renderSlot(dateKey, slot) {
      const note = getSlotNote(dateKey, slot.id);
      const slotEl = document.createElement("div");
      slotEl.className = `slot${slot.allDay ? " all-day" : ""}${note ? " has-note" : ""}`;
      slotEl.dataset.date = dateKey;
      slotEl.dataset.slot = slot.id;
      slotEl.setAttribute("aria-label", `${formatDate(dateKey)} ${slot.label}`);

      const menuButton = document.createElement("button");
      menuButton.className = "slot-menu-button";
      menuButton.type = "button";
      menuButton.innerHTML = iconSvg("menu");
      menuButton.setAttribute("aria-label", "編輯安排");
      menuButton.addEventListener("click", (event) => {
        event.stopPropagation();
        if (!requireEditing()) return;
        openSlotMenu(slotEl, dateKey, slot);
      });
      slotEl.appendChild(menuButton);

      if (note) {
        const noteEl = document.createElement("div");
        noteEl.className = "slot-note";
        noteEl.textContent = note;
        slotEl.appendChild(noteEl);

        const noteDot = document.createElement("span");
        noteDot.className = "note-dot";
        noteDot.setAttribute("aria-hidden", "true");
        slotEl.appendChild(noteDot);
      }

      const personId = state.assignments[dateKey]?.[slot.id];
      if (personId && people[personId]) {
        slotEl.dataset.person = personId;
        const chip = document.createElement("div");
        chip.className = "assignment-chip";
        chip.dataset.person = personId;
        chip.draggable = isEditing;
        chip.innerHTML = `<strong>${people[personId].label}</strong>`;
        chip.addEventListener("dragstart", (event) => {
          if (!isEditing) {
            event.preventDefault();
            return;
          }
          setDragPayload(event, { personId, source: { dateKey, slotId: slot.id } });
        });
        slotEl.appendChild(chip);
      } else {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.innerHTML = iconSvg("plus");
        slotEl.appendChild(empty);
      }

      slotEl.addEventListener("dragover", (event) => {
        if (!isEditing) return;
        event.preventDefault();
        slotEl.classList.add("drag-over");
      });
      slotEl.addEventListener("dragleave", () => slotEl.classList.remove("drag-over"));
      slotEl.addEventListener("drop", (event) => {
        if (!isEditing) return;
        event.preventDefault();
        slotEl.classList.remove("drag-over");
        const payload = readDragPayload(event);
        if (!payload?.personId) return;
        assignPerson(dateKey, slot.id, payload.personId, payload.source);
      });
      slotEl.addEventListener("click", (event) => {
        if (event.target.closest(".slot-menu-button")) return;
        if (!requireEditing()) return;
        openSlotMenu(slotEl, dateKey, slot);
      });

      return slotEl;
    }

    function openSlotMenu(slotEl, dateKey, slot) {
      activeSlot = { dateKey, slotId: slot.id };
      popoverTitle.textContent = `${formatDate(dateKey)} ${slot.label}`;
      const timeRule = getTimeRuleForDate(slot.id, dateKey);
      popoverSubtitle.textContent = timeRule ? `${formatRuleRange(timeRule)}：${timeRule.text}` : (slot.allDay ? "整日安排" : slot.calendarTime[0]);
      noteInput.value = getSlotNote(dateKey, slot.id);
      personMenu.innerHTML = Object.values(people).map((person) => `
        <button class="person-choice" data-person="${person.id}" type="button">${person.label}</button>
      `).join("") + `<button class="clear-choice" type="button">清空安排</button>`;

      personMenu.querySelectorAll(".person-choice").forEach((button) => {
        button.addEventListener("click", () => {
          assignPerson(dateKey, slot.id, button.dataset.person);
          closePopover();
        });
      });
      personMenu.querySelector(".clear-choice").addEventListener("click", () => {
        removeAssignment(dateKey, slot.id);
        closePopover();
      });

      const rect = slotEl.getBoundingClientRect();
      const left = Math.min(Math.max(14, rect.left), window.innerWidth - 334);
      const top = Math.min(rect.bottom + 8, window.innerHeight - 300);
      popover.style.left = `${left}px`;
      popover.style.top = `${Math.max(14, top)}px`;
      popover.classList.add("open");
    }

    function closePopover() {
      popover.classList.remove("open");
      activeSlot = null;
    }

    function renderSummary() {
      const counts = Object.fromEntries(Object.keys(people).map((personId) => [personId, 0]));
      const items = [];
      getWeekDates().forEach((dateKey) => {
        getSlots(dateKey).forEach((slot) => {
          const personId = state.assignments[dateKey]?.[slot.id];
          if (!personId || !people[personId]) return;
          counts[personId] += slot.allDay ? 3 : 1;
          items.push({ dateKey, slot, personId });
        });
      });

      stats.innerHTML = Object.values(people).map((person) => `
        <div class="stat">
          <strong>${counts[person.id]}</strong>
          <span>${person.label} 責任點數</span>
        </div>
      `).join("");

      timeline.innerHTML = items.length
        ? items.map((item) => `
          <div class="timeline-item">
            <time>${formatDate(item.dateKey)}</time>
            <div>${item.slot.label}：<strong>${people[item.personId].label}</strong></div>
          </div>
        `).join("")
        : `<div class="empty-state">本週尚未安排</div>`;
    }

    function renderOps() {
      const startKey = todayKey();
      const events = generateOpsEvents(startKey, 30).filter(opsEventVisibleTo);
      opsViewLabel.textContent = opsPerspective === "morpheus" ? "你要主動處理" : "你會收到 / 需要知道";

      opsTimeline.innerHTML = events.length
        ? events.map((event) => {
          const dayDiff = Math.round((toDate(event.dateKey) - toDate(startKey)) / 86400000);
          const status = dayDiff === 0 ? "今天" : dayDiff <= 7 ? "7 日內" : "未來";
          const statusClass = dayDiff === 0 ? "today" : dayDiff <= 7 ? "soon" : "";
          const amount = event.amount ? ` ${formatAmount(event.amount)}` : "";
          return `
            <div class="ops-event">
              <time>${formatDate(event.dateKey)}<span>${weekdayLabels[toDate(event.dateKey).getDay()]}</span></time>
              <div class="ops-icon">${event.icon}</div>
              <div class="ops-event-main">
                <strong>${escapeHtml(event.action)}${escapeHtml(amount)}</strong>
                <span>${escapeHtml(event.detail || opsRuleLabel(event))}</span>
              </div>
              <div class="ops-status ${statusClass}">${status}</div>
            </div>
          `;
        }).join("")
        : `<div class="empty-state">未來 30 天沒有共同事務</div>`;

      opsPendingList.innerHTML = opsPendingItems
        .filter((item) => {
          if (opsPerspective === "morpheus") return item.owner === "morpheus" || item.owner === "both";
          return item.owner === "lisa" || item.owner === "both";
        })
        .map((item) => `
          <div class="ops-rule pending">
            <div><strong>${item.icon} ${escapeHtml(item.title)}</strong><span>${escapeHtml(item.detail)}</span></div>
            <span class="ops-pill">待討論</span>
          </div>
        `).join("");

      opsRuleList.innerHTML = opsRules.map((rule) => {
        const amount = rule.amount ? `，${formatAmount(rule.amount)}` : "";
        return `
          <div class="ops-rule">
            <div><strong>${rule.icon} ${escapeHtml(opsRuleLabel(rule))}</strong><span>${escapeHtml(rule.action)}${escapeHtml(amount)}</span></div>
            <span class="ops-pill">編輯</span>
          </div>
        `;
      }).join("");

      opsConditionList.innerHTML = opsConditionRules.map((text) => `
        <div class="ops-rule">
          <div><strong>🔔 ${escapeHtml(text)}</strong><span>只做提醒與速查，不排進日曆。</span></div>
        </div>
      `).join("");
    }

    function opsSummary(event) {
      return `${event.icon} ${event.action}${event.amount ? ` ${formatAmount(event.amount)}` : ""}`;
    }

    function opsDescription(event) {
      return [event.detail || opsRuleLabel(event), event.recipient === "lisa" ? "Lisa 視角：應收款 / 需知道" : ""]
        .filter(Boolean)
        .join("\n");
    }

    function escapeIcsText(value) {
      return String(value)
        .replaceAll("\\", "\\\\")
        .replaceAll(";", "\\;")
        .replaceAll(",", "\\,")
        .replaceAll("\n", "\\n");
    }

    function buildIcs() {
      const lines = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//Family Ops//Care Planner//ZH"
      ];

      Object.entries(state.assignments).forEach(([dateKey, slots]) => {
        getSlots(dateKey).forEach((slot) => {
          const personId = slots[slot.id];
          if (!personId || !people[personId]) return;
          const compactDate = dateKey.replaceAll("-", "");
          const uid = `${dateKey}-${slot.id}-${personId}@family-ops`;
          lines.push("BEGIN:VEVENT");
          lines.push(`UID:${uid}`);
          lines.push(`SUMMARY:${slot.label} - ${people[personId].label}`);
          const note = getSlotNote(dateKey, slot.id);
          const timeRule = getTimeRuleForDate(slot.id, dateKey);
          const description = [timeRule ? `時間規則：${timeRule.text}` : "", note].filter(Boolean).join("\\n");
          if (description) lines.push(`DESCRIPTION:${description.replaceAll("\n", "\\n")}`);
          if (slot.allDay) {
            lines.push(`DTSTART;VALUE=DATE:${compactDate}`);
            lines.push(`DTEND;VALUE=DATE:${addDays(dateKey, 1).replaceAll("-", "")}`);
          } else {
            const [startTime, endTime] = slot.calendarTime;
            lines.push(`DTSTART:${compactDate}T${startTime.replace(":", "")}00`);
            lines.push(`DTEND:${compactDate}T${endTime.replace(":", "")}00`);
          }
          lines.push("END:VEVENT");
        });
      });

      generateOpsEvents(todayKey(), 365).forEach((event) => {
        const compactDate = event.dateKey.replaceAll("-", "");
        lines.push("BEGIN:VEVENT");
        lines.push(`UID:ops-${event.dateKey}-${event.id}@family-ops`);
        lines.push(`SUMMARY:${escapeIcsText(opsSummary(event))}`);
        lines.push(`DESCRIPTION:${escapeIcsText(opsDescription(event))}`);
        lines.push(`DTSTART;VALUE=DATE:${compactDate}`);
        lines.push(`DTEND;VALUE=DATE:${addDays(event.dateKey, 1).replaceAll("-", "")}`);
        lines.push("END:VEVENT");
      });

      lines.push("END:VCALENDAR");
      return lines.join("\r\n");
    }

    function downloadIcs() {
      const blob = new Blob([buildIcs()], { type: "text/calendar;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "family-care-schedule.ics";
      link.click();
      URL.revokeObjectURL(link.href);
      showToast("已產生日曆檔");
    }

    function buildSyncEvents() {
      const events = [];
      Object.entries(state.assignments).forEach(([dateKey, slots]) => {
        getSlots(dateKey).forEach((slot) => {
          const personId = slots[slot.id];
          if (!personId || !people[personId]) return;
          const note = getSlotNote(dateKey, slot.id);
          const timeRule = getTimeRuleForDate(slot.id, dateKey);
          const event = {
            date: dateKey,
            slotId: slot.id,
            slotLabel: slot.label,
            personId,
            personLabel: people[personId].label,
            summary: `${slot.label} - ${people[personId].label}`,
            note,
            timeRule: timeRule ? timeRule.text : "",
            allDay: Boolean(slot.allDay)
          };
          if (!slot.allDay) {
            event.startTime = slot.calendarTime[0];
            event.endTime = slot.calendarTime[1];
          }
          events.push(event);
        });
      });
      generateOpsEvents(todayKey(), 365).forEach((event) => {
        events.push({
          date: event.dateKey,
          slotId: `ops_${event.id}`,
          slotLabel: "共同事務",
          personId: "ops",
          personLabel: "共同事務",
          summary: opsSummary(event),
          note: opsDescription(event),
          timeRule: event.detail || opsRuleLabel(event),
          allDay: true
        });
      });
      return events;
    }

    function normalizeSyncToken(value) {
      const token = String(value || "").trim();
      if (token.includes("=")) {
        return token.split("=").pop().trim();
      }
      return token;
    }

    async function syncToCalendar() {
      if (syncInFlight) return;
      const defaultToken = localStorage.getItem(SYNC_TOKEN_KEY) || CARE_PLANNER_SYNC_TOKEN;
      const syncToken = normalizeSyncToken(defaultToken);
      if (!syncToken) return;
      localStorage.setItem(SYNC_TOKEN_KEY, syncToken);

      const events = buildSyncEvents();
      syncInFlight = true;
      syncButton.disabled = true;
      syncButton.textContent = "同步中…";
      showToast("同步中…");
      try {
        const response = await fetch(CARE_PLANNER_SYNC_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${syncToken}`
          },
          body: JSON.stringify({
            calendarId: CARE_PLANNER_CALENDAR_ID,
            source: "care-planner",
            events
          })
        });
        const result = await response.json().catch(() => ({}));
        if (!response.ok) {
          if (response.status === 401) {
            localStorage.removeItem(SYNC_TOKEN_KEY);
            throw new Error("同步設定已失效，請聯絡維護者更新");
          }
          throw new Error(result.error || "同步失敗");
        }
        showToast(`已同步 ${result.inserted || events.length} 筆`);
      } catch (error) {
        if (error instanceof TypeError) {
          showToast("同步服務目前無法連線");
          return;
        }
        showToast(error.message || "同步失敗");
      } finally {
        syncInFlight = false;
        syncButton.disabled = false;
        syncButton.textContent = "同步日曆";
      }
    }

    saveButton.addEventListener("click", saveState);
    cancelEditButton.addEventListener("click", cancelEditMode);
    undoButton.addEventListener("click", undo);
    redoButton.addEventListener("click", redo);
    viewTabs.forEach((button) => {
      button.addEventListener("click", () => switchView(button.dataset.view));
    });
    perspectiveButtons.forEach((button) => {
      button.addEventListener("click", () => {
        opsPerspective = button.dataset.perspective;
        perspectiveButtons.forEach((item) => item.classList.toggle("active", item === button));
        renderOps();
      });
    });
    document.querySelector("#prevWeek").addEventListener("click", () => {
      pauseAutoExtend();
      const nextStart = addDays(visibleStartDate(), -7);
      state.weekStart = state.showPast || compareDateKeys(nextStart, todayKey()) >= 0 ? nextStart : todayKey();
      state.visibleDays = INITIAL_VISIBLE_DAYS;
      render();
    });
    document.querySelector("#nextWeek").addEventListener("click", () => {
      pauseAutoExtend();
      state.weekStart = addDays(visibleStartDate(), 7);
      state.showPast = false;
      state.visibleDays = INITIAL_VISIBLE_DAYS;
      render();
    });
    todayButton.addEventListener("click", () => {
      pauseAutoExtend();
      state.weekStart = todayKey();
      state.showPast = false;
      state.visibleDays = INITIAL_VISIBLE_DAYS;
      render();
      scrollToToday();
      showToast("已回到今天");
    });
    togglePastButton.addEventListener("click", () => {
      pauseAutoExtend();
      state.showPast = !state.showPast;
      state.weekStart = state.showPast ? earliestAssignmentKey() : todayKey();
      state.visibleDays = INITIAL_VISIBLE_DAYS;
      render();
    });
    document.querySelector("#downloadIcs").addEventListener("click", downloadIcs);
    syncButton.addEventListener("click", syncToCalendar);
    document.querySelector("#closePopover").addEventListener("click", closePopover);
    document.querySelector("#saveNote").addEventListener("click", () => {
      if (!activeSlot) return;
      saveNote(activeSlot.dateKey, activeSlot.slotId, noteInput.value);
      closePopover();
    });

    document.addEventListener("click", (event) => {
      if (!popover.classList.contains("open")) return;
      if (event.target.closest("#slotPopover") || event.target.closest(".slot")) return;
      closePopover();
    });

    document.addEventListener("keydown", (event) => {
      const modifier = event.metaKey || event.ctrlKey;
      if (!modifier || !isEditing) return;
      const key = event.key.toLowerCase();
      if (key === "z" && !event.shiftKey) {
        event.preventDefault();
        undo();
      }
      if ((key === "z" && event.shiftKey) || key === "y") {
        event.preventDefault();
        redo();
      }
    });

    window.matchMedia(MOBILE_QUERY).addEventListener("change", render);
    window.addEventListener("scroll", maybeExtendVisibleDays, { passive: true });
    if (boardWrap) {
      boardWrap.addEventListener("scroll", maybeExtendVisibleDays, { passive: true });
    }

    window.addEventListener("beforeunload", (event) => {
      if (!isEditing) return;
      event.preventDefault();
      event.returnValue = "";
    });

    loadState();
    switchView("care");
    render();
  </script>
</body>
</html>
